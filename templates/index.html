<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네이버 블로그 자동화</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --green: #00e676;
    --green-dim: #00c85320;
    --red: #ff5252;
    --yellow: #ffd740;
    --blue: #40c4ff;
    --text: #e0e0e0;
    --text-dim: #666;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* 레이아웃 */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }

  /* 사이드바 */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: fixed;
    width: 260px;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .logo {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo h1 {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .nav {
    padding: 16px 0;
    flex: 1;
  }

  .nav-item {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 2px solid transparent;
  }

  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--green); border-left-color: var(--green); background: var(--green-dim); }

  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  /* 계정 목록 in sidebar */
  .account-list-side {
    padding: 0 12px 16px;
  }

  .account-list-side-title {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 8px 8px;
  }

  .account-chip {
    padding: 8px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }

  .account-chip:hover { background: var(--surface2); color: var(--text); }
  .account-chip.active { background: var(--green-dim); color: var(--green); }

  .account-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  /* 메인 */
  .main {
    margin-left: 260px;
    padding: 32px;
    min-height: 100vh;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* 헤더 */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
  }

  .page-title span { color: var(--green); }

  /* 카드 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* 폼 */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: block; }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--green); }
  textarea { resize: vertical; min-height: 120px; }

  /* 버튼 */
  .btn {
    padding: 9px 18px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--green);
    color: #000;
  }
  .btn-primary:hover { background: #00ff88; }
  .btn-primary:disabled { background: #333; color: var(--text-dim); cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
  }
  .btn-danger:hover { background: var(--red); color: #000; }

  .btn-blue {
    background: var(--blue);
    color: #000;
  }
  .btn-blue:hover { opacity: 0.85; }

  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* 그리드 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  /* 통계 카드 */
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .stat-value { font-size: 32px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .stat-value.green { color: var(--green); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.yellow { color: var(--yellow); }

  /* 테이블 */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 14px; text-align: left; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 12px 14px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
  tr:hover td { background: var(--surface2); }

  /* 배지 */
  .badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-yellow { background: #ffd74020; color: var(--yellow); }
  .badge-red { background: #ff525220; color: var(--red); }

  /* 글 미리보기 */
  .post-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 16px;
    display: none;
  }

  .post-preview.visible { display: block; }

  .post-preview-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
  }

  .post-preview-body {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-dim);
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }

  .post-preview-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* 로딩 */
  .loading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 토스트 */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    min-width: 240px;
    animation: slideIn 0.2s ease;
  }

  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--blue); }

  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* 빈 상태 */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-text { font-size: 14px; }

  /* 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 560px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 12px; }
</style>
</head>
<body>

<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="logo">
      <h1>BlogAuto</h1>
      <p>네이버 블로그 자동화</p>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
        <span class="nav-icon">📊</span> 대시보드
      </div>
      <div class="nav-item" onclick="showPage('accounts')" data-page="accounts">
        <span class="nav-icon">👤</span> 계정 관리
      </div>
      <div class="nav-item" onclick="showPage('generate')" data-page="generate">
        <span class="nav-icon">✍️</span> 글 생성
      </div>
      <div class="nav-item" onclick="showPage('posts')" data-page="posts">
        <span class="nav-icon">📋</span> 포스트 목록
      </div>
    </nav>

    <div class="account-list-side">
      <div class="account-list-side-title">계정 목록</div>
      <div id="sidebarAccounts"></div>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main">

    <!-- 대시보드 -->
    <div class="page active" id="page-dashboard">
      <div class="page-header">
        <div class="page-title">대시보드 <span>Overview</span></div>
      </div>
      <div class="grid-3" style="margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-value green" id="stat-accounts">0</div>
          <div class="stat-label">관리 계정</div>
        </div>
        <div class="stat-card">
          <div class="stat-value blue" id="stat-total">0</div>
          <div class="stat-label">전체 포스트</div>
        </div>
        <div class="stat-card">
          <div class="stat-value yellow" id="stat-published">0</div>
          <div class="stat-label">발행 완료</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">최근 포스트</div>
        <div id="recentPosts">
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">아직 포스트가 없어요</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 계정 관리 -->
    <div class="page" id="page-accounts">
      <div class="page-header">
        <div class="page-title">계정 <span>관리</span></div>
        <button class="btn btn-primary" onclick="openAddAccount()">+ 계정 추가</button>
      </div>
      <div class="card">
        <div id="accountsTable">
          <div class="empty-state">
            <div class="empty-state-icon">👤</div>
            <div class="empty-state-text">등록된 계정이 없어요</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 글 생성 -->
    <div class="page" id="page-generate">
      <div class="page-header">
        <div class="page-title">글 <span>생성</span></div>
      </div>
      <div class="grid-2">
        <div>
          <div class="card">
            <div class="card-title">글 생성 설정</div>
            <div class="form-group">
              <label class="form-label">계정 선택</label>
              <select id="gen-account">
                <option value="">계정을 선택하세요</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">키워드 / 주제</label>
              <input type="text" id="gen-keyword" placeholder="예: 강남 맛집 추천, 부동산 투자 방법" />
            </div>
            <div class="form-group">
              <label class="form-label">추가 요청 (선택)</label>
              <textarea id="gen-prompt" placeholder="예: 20대 직장인 타겟, 3개 맛집 포함해줘"></textarea>
            </div>
            <button class="btn btn-primary" id="gen-btn" onclick="generatePost()" style="width:100%;">
              ✨ AI 글 생성
            </button>
          </div>
        </div>
        <div>
          <div class="card">
            <div class="card-title">미리보기</div>
            <div id="preview-empty" class="empty-state" style="padding:40px 0;">
              <div class="empty-state-icon">✍️</div>
              <div class="empty-state-text">글을 생성하면 여기에 표시돼요</div>
            </div>
            <div id="preview-content" style="display:none;">
              <div class="form-group">
                <label class="form-label">제목</label>
                <input type="text" id="preview-title" />
              </div>
              <div class="form-group">
                <label class="form-label">본문</label>
                <textarea id="preview-body" style="min-height:200px;"></textarea>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-primary" onclick="publishPost()" id="pub-btn" style="flex:1;">
                  🚀 네이버 발행
                </button>
                <button class="btn btn-ghost" onclick="saveOnly()">저장만</button>
                <button class="btn btn-danger btn-sm" onclick="discardPost()">✕</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 포스트 목록 -->
    <div class="page" id="page-posts">
      <div class="page-header">
        <div class="page-title">포스트 <span>목록</span></div>
        <select id="filter-account" onchange="loadPosts()" style="width:auto;padding:8px 14px;">
          <option value="">전체 계정</option>
        </select>
      </div>
      <div class="card">
        <div id="postsTable">
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-text">포스트가 없어요</div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- 계정 추가 모달 -->
<div class="modal-overlay" id="modal-account">
  <div class="modal">
    <div class="modal-title">계정 추가</div>
    <div class="form-group">
      <label class="form-label">고객 이름 / 사업체명</label>
      <input type="text" id="acc-name" placeholder="예: 강남 카페 홍길동" />
    </div>
    <div class="form-group">
      <label class="form-label">네이버 아이디</label>
      <input type="text" id="acc-id" placeholder="naver_id" />
    </div>
    <div class="form-group">
      <label class="form-label">네이버 비밀번호</label>
      <input type="password" id="acc-pw" placeholder="비밀번호" />
    </div>
    <div class="form-group">
      <label class="form-label">블로그 주제 유형</label>
      <select id="acc-topic">
        <option value="맛집">🍽️ 맛집/카페</option>
        <option value="부동산">🏠 부동산/금융</option>
        <option value="뷰티">💄 뷰티/쇼핑</option>
        <option value="건강">💪 건강/운동</option>
        <option value="여행">✈️ 여행</option>
        <option value="IT">💻 IT/테크</option>
        <option value="쇼핑">🛍️ 쇼핑/리뷰</option>
        <option value="기타">📝 기타</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-account')">취소</button>
      <button class="btn btn-primary" onclick="addAccount()">추가</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast-container" id="toastContainer"></div>

<script>
let currentPostId = null;
let accounts = [];

// 페이지 전환
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelector(`[data-page="${name}"]`).classList.add('active');

  if (name === 'dashboard') loadDashboard();
  if (name === 'accounts') loadAccounts();
  if (name === 'posts') loadPosts();
}

// 토스트
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// 모달
function openAddAccount() { document.getElementById('modal-account').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// 계정 로드
async function loadAccountsData() {
  const res = await fetch('/api/accounts');
  accounts = await res.json();

  // 사이드바
  const sidebar = document.getElementById('sidebarAccounts');
  sidebar.innerHTML = accounts.length === 0
    ? '<div style="font-size:11px;color:#444;padding:8px;">등록된 계정 없음</div>'
    : accounts.map(a => `
      <div class="account-chip" onclick="filterByAccount(${a.id})">
        <div class="account-dot"></div>
        <span>${a.client_name}</span>
      </div>`).join('');

  // 셀렉트박스들
  const selects = ['gen-account', 'filter-account'];
  selects.forEach(id => {
    const el = document.getElementById(id);
    const firstOption = el.options[0];
    el.innerHTML = '';
    el.appendChild(firstOption);
    accounts.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = `${a.client_name} (${a.naver_id})`;
      el.appendChild(opt);
    });
  });
}

// 계정 추가
async function addAccount() {
  const name = document.getElementById('acc-name').value.trim();
  const naverId = document.getElementById('acc-id').value.trim();
  const naverPw = document.getElementById('acc-pw').value.trim();
  const topic = document.getElementById('acc-topic').value;

  if (!name || !naverId || !naverPw) { toast('모든 항목을 입력해주세요', 'error'); return; }

  const res = await fetch('/api/accounts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({client_name: name, naver_id: naverId, naver_pw: naverPw, topic_type: topic})
  });

  if ((await res.json()).success) {
    toast('계정이 추가됐어요', 'success');
    closeModal('modal-account');
    await loadAccountsData();
    loadAccounts();
  }
}

// 계정 목록 렌더
async function loadAccounts() {
  await loadAccountsData();
  const el = document.getElementById('accountsTable');

  if (accounts.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👤</div><div class="empty-state-text">등록된 계정이 없어요</div></div>';
    return;
  }

  el.innerHTML = `
    <div class="table-wrap">
    <table>
      <thead><tr><th>고객명</th><th>네이버 ID</th><th>주제 유형</th><th>등록일</th><th>액션</th></tr></thead>
      <tbody>
        ${accounts.map(a => `
          <tr>
            <td><strong>${a.client_name}</strong></td>
            <td style="font-family:'Space Mono',monospace;font-size:12px;">${a.naver_id}</td>
            <td>${a.topic_type}</td>
            <td style="color:var(--text-dim);font-size:12px;">${a.created_at?.slice(0,10) || '-'}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteAccount(${a.id})">삭제</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

async function deleteAccount(id) {
  if (!confirm('계정을 삭제할까요?')) return;
  await fetch('/api/accounts/' + id, {method:'DELETE'});
  toast('계정 삭제됨', 'success');
  await loadAccountsData();
  loadAccounts();
}

// 글 생성
async function generatePost() {
  const accountId = document.getElementById('gen-account').value;
  const keyword = document.getElementById('gen-keyword').value.trim();
  const prompt = document.getElementById('gen-prompt').value.trim();

  if (!accountId) { toast('계정을 선택해주세요', 'error'); return; }
  if (!keyword) { toast('키워드를 입력해주세요', 'error'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"><span class="spinner"></span> 생성 중...</span>';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({account_id: accountId, keyword, custom_prompt: prompt})
    });
    const data = await res.json();

    if (data.success) {
      currentPostId = data.post_id;
      document.getElementById('preview-title').value = data.title;
      document.getElementById('preview-body').value = data.body;
      document.getElementById('preview-empty').style.display = 'none';
      document.getElementById('preview-content').style.display = 'block';
      toast('글이 생성됐어요!', 'success');
    } else {
      toast('생성 실패: ' + data.message, 'error');
    }
  } catch (e) {
    toast('오류 발생', 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '✨ AI 글 생성';
}

// 발행
async function publishPost() {
  if (!currentPostId) return;

  // 수정된 내용 저장
  await fetch('/api/posts/' + currentPostId, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      title: document.getElementById('preview-title').value,
      body: document.getElementById('preview-body').value
    })
  });

  const btn = document.getElementById('pub-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"><span class="spinner"></span> 발행 중...</span>';

  try {
    const res = await fetch('/api/publish/' + currentPostId, {method:'POST'});
    const data = await res.json();

    if (data.success) {
      toast('네이버 블로그에 발행됐어요! 🎉', 'success');
      discardPost();
      loadDashboard();
    } else {
      toast('발행 실패: ' + data.message, 'error');
    }
  } catch (e) {
    toast('발행 중 오류', 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '🚀 네이버 발행';
}

async function saveOnly() {
  if (!currentPostId) return;
  await fetch('/api/posts/' + currentPostId, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      title: document.getElementById('preview-title').value,
      body: document.getElementById('preview-body').value
    })
  });
  toast('저장됐어요', 'success');
}

function discardPost() {
  currentPostId = null;
  document.getElementById('preview-empty').style.display = 'block';
  document.getElementById('preview-content').style.display = 'none';
}

// 포스트 목록
async function loadPosts() {
  const accountId = document.getElementById('filter-account').value;
  const url = '/api/posts' + (accountId ? '?account_id=' + accountId : '');
  const res = await fetch(url);
  const posts = await res.json();
  const el = document.getElementById('postsTable');

  if (posts.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">포스트가 없어요</div></div>';
    return;
  }

  el.innerHTML = `
    <div class="table-wrap">
    <table>
      <thead><tr><th>계정</th><th>키워드</th><th>제목</th><th>상태</th><th>날짜</th><th>액션</th></tr></thead>
      <tbody>
        ${posts.map(p => `
          <tr>
            <td style="font-size:12px;">${p.client_name}</td>
            <td><span style="background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:11px;">${p.keyword}</span></td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.title}</td>
            <td>
              <span class="badge ${p.status === 'published' ? 'badge-green' : 'badge-yellow'}">
                ${p.status === 'published' ? '발행됨' : '초안'}
              </span>
            </td>
            <td style="color:var(--text-dim);font-size:12px;">${p.created_at?.slice(0,10) || '-'}</td>
            <td class="flex gap-2">
              ${p.status !== 'published' ? `<button class="btn btn-blue btn-sm" onclick="publishDraft(${p.id})">발행</button>` : ''}
              ${p.published_url ? `<a href="${p.published_url}" target="_blank" class="btn btn-ghost btn-sm">보기</a>` : ''}
              <button class="btn btn-danger btn-sm" onclick="deletePost(${p.id})">삭제</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

async function publishDraft(postId) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '...';
  const res = await fetch('/api/publish/' + postId, {method:'POST'});
  const data = await res.json();
  if (data.success) { toast('발행 완료!', 'success'); loadPosts(); }
  else { toast('실패: ' + data.message, 'error'); btn.disabled = false; btn.textContent = '발행'; }
}

async function deletePost(id) {
  if (!confirm('삭제할까요?')) return;
  await fetch('/api/posts/' + id, {method:'DELETE'});
  toast('삭제됨', 'success');
  loadPosts();
}

function filterByAccount(id) {
  showPage('posts');
  document.getElementById('filter-account').value = id;
  loadPosts();
}

// 대시보드
async function loadDashboard() {
  await loadAccountsData();
  const postsRes = await fetch('/api/posts');
  const posts = await postsRes.json();

  document.getElementById('stat-accounts').textContent = accounts.length;
  document.getElementById('stat-total').textContent = posts.length;
  document.getElementById('stat-published').textContent = posts.filter(p => p.status === 'published').length;

  const el = document.getElementById('recentPosts');
  const recent = posts.slice(0, 8);

  if (recent.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-text">아직 포스트가 없어요</div></div>';
    return;
  }

  el.innerHTML = `
    <div class="table-wrap">
    <table>
      <thead><tr><th>계정</th><th>키워드</th><th>제목</th><th>상태</th><th>날짜</th></tr></thead>
      <tbody>
        ${recent.map(p => `
          <tr>
            <td style="font-size:12px;">${p.client_name}</td>
            <td><span style="background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:11px;">${p.keyword}</span></td>
            <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.title}</td>
            <td><span class="badge ${p.status === 'published' ? 'badge-green' : 'badge-yellow'}">${p.status === 'published' ? '발행됨' : '초안'}</span></td>
            <td style="color:var(--text-dim);font-size:12px;">${p.created_at?.slice(0,10) || '-'}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

// 초기화
loadAccountsData();
loadDashboard();
</script>
</body>
</html>
